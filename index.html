<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface Fusionnée : Onglets MediaPipe & OpenCV</title>
    
    <link href="https://unpkg.com/material-components-web@latest/dist/material-components-web.min.css" rel="stylesheet">
    
    <style>
        body {
            font-family: Roboto, sans-serif;
            margin: 2em;
            color: #3d3d3d;
            background-color: #f4f6f8;
        }
        h1 { color: #007f8b; }

        /* Style des Onglets */
        .tab-container {
            display: flex;
            border-bottom: 2px solid #ccc;
            margin-bottom: 20px;
            gap: 10px;
        }
        .tab-button {
            padding: 10px 20px;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 1rem;
            font-weight: bold;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }
        .tab-button.active {
            color: #007f8b;
            border-bottom-color: #007f8b;
        }

        /* Conteneurs d'affichage */
        .view-panel { display: none; }
        .view-panel.active { display: block; }
        
        .videoView {
            position: relative;
            width: 640px;
            height: 480px;
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
        }
        
        #webcam { display: none; }
        
        /* Ajustements des Canvas */
        canvas {
            position: absolute;
            left: 0; top: 0;
            width: 640px; height: 480px;
            transform: scaleX(-1); /* Mode miroir */
        }
        
        #mp_canvas { z-index: 2; pointer-events: none; }
        #cv_canvas { z-index: 1; }

        .output-box {
            margin-top: 15px;
            padding: 12px;
            background-color: #007f8b;
            color: white;
            font-size: 1.1rem;
            border-radius: 5px;
            width: 616px;
            min-height: 24px;
        }
        
        #gesture_output { display: none; }
        
        .controls { margin-bottom: 20px; }
        #loadingMessage {
            color: #007f8b;
            font-weight: bold;
            margin-left: 15px;
        }
    </style>
</head>
<body>

    <h1>Analyse Vidéo Temps Réel</h1>
    
    <div class="controls">
        <button id="webcamButton" class="mdc-button mdc-button--raised" disabled>
            <span class="mdc-button__label">ATTENTE DU CHARGEMENT...</span>
        </button>
        <span id="loadingMessage">Chargement des modules IA...</span>
    </div>

    <div class="tab-container">
        <button class="tab-button active" onclick="switchTab(event, 'mediapipe')">Mains & Gestes (MediaPipe)</button>
        <button class="tab-button" onclick="switchTab(event, 'opencv')">Formes & Couleurs (OpenCV)</button>
    </div>

    <video id="webcam" autoplay playsinline width="640" height="480"></video>

    <div id="panel-mediapipe" class="view-panel active">
        <h2>Reconnaissance des Gestes de la Main</h2>
        <div class="videoView">
            <canvas id="mp_canvas" width="640" height="480"></canvas>
        </div>
        <div id="gesture_output" class="output-box">Geste : Aucun</div>
    </div>

    <div id="panel-opencv" class="view-panel">
        <h2>Suivi des Formes Géométriques et Couleurs</h2>
        <div class="videoView">
            <canvas id="cv_canvas" width="640" height="480"></canvas>
        </div>
        <div id="shape_output" class="output-box">Détection active (Regardez la console pour le détail des formes)</div>
    </div>

    
    <script>
        window.cvReady = false;
        function onOpenCvReady() {
            console.log("OpenCV.js chargé avec succès.");
            window.cvReady = true;
        }

        window.activeTab = 'mediapipe';
        
        function switchTab(e, tabName) {
            window.activeTab = tabName;
            
            document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
            e.currentTarget.classList.add('active'); 
            
            document.querySelectorAll('.view-panel').forEach(panel => panel.classList.remove('active'));
            document.getElementById(`panel-${tabName}`).classList.add('active');
        }
    </script>
    
    

    <script type="module">
        import {
            GestureRecognizer,
            FilesetResolver,
            DrawingUtils
        } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.12/vision_bundle.mjs";

        const video = document.getElementById("webcam");
        const mpCanvas = document.getElementById("mp_canvas");
        const mpCtx = mpCanvas.getContext("2d");
        const cvCanvas = document.getElementById("cv_canvas");
        const gestureOutput = document.getElementById("gesture_output");
        const enableWebcamButton = document.getElementById("webcamButton");
        const loadingMessage = document.getElementById("loadingMessage");

        let gestureRecognizer;
        let webcamRunning = false;
        let lastVideoTime = -1;
        let cap, srcFrame, blurredFrame, ycrcbFrame, mask, kernel;

        const colors_YCrCb = {
            "vert": { lower: [0, 70, 90, 0], upper: [255, 110, 130, 255], bgr: [0, 255, 0, 255] },
            "bleu": { lower: [0, 60, 160, 0], upper: [255, 100, 200, 255], bgr: [255, 0, 0, 255] },
            "rouge": { lower: [0, 190, 80, 0], upper: [255, 230, 120, 255], bgr: [0, 0, 255, 255] }
        };

        async function initMediaPipe() {
            try {
                const vision = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.12/wasm"
                );
                
                gestureRecognizer = await GestureRecognizer.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/gesture_recognizer/gesture_recognizer/float16/1/gesture_recognizer.task",
                        delegate: "CPU" // SÉCURITÉ : Retour au CPU obligatoire pour éviter le freeze WebGL
                    },
                    runningMode: "VIDEO"
                });

                loadingMessage.style.display = "none";
                enableWebcamButton.disabled = false;
                enableWebcamButton.querySelector('.mdc-button__label').innerText = "ACTIVER LA WEBCAM";
                enableWebcamButton.addEventListener("click", toggleWebcam);
            } catch (error) {
                loadingMessage.innerText = "Erreur IA. Pensez à vider le cache.";
                loadingMessage.style.color = "red";
                console.error("Erreur d'initialisation :", error);
            }
        }
        
        initMediaPipe();

        function initOpenCVStructures() {
            if (!cap && window.cvReady && video.videoWidth > 0) {
                cap = new cv.VideoCapture(video);
                srcFrame = new cv.Mat(video.height, video.width, cv.CV_8UC4);
                blurredFrame = new cv.Mat(video.height, video.width, cv.CV_8UC4);
                ycrcbFrame = new cv.Mat(video.height, video.width, cv.CV_8UC3);
                mask = new cv.Mat(video.height, video.width, cv.CV_8UC1);
                kernel = cv.Mat.ones(3, 3, cv.CV_8U);
            }
        }

        function toggleWebcam() {
            if (webcamRunning) {
                webcamRunning = false;
                enableWebcamButton.querySelector('.mdc-button__label').innerText = "ACTIVER LA WEBCAM";
                if (video.srcObject) {
                    video.srcObject.getTracks().forEach(track => track.stop());
                }
            } else {
                webcamRunning = true;
                enableWebcamButton.querySelector('.mdc-button__label').innerText = "COUPE LA WEBCAM";
                navigator.mediaDevices.getUserMedia({ video: true }).then((stream) => {
                    video.srcObject = stream;
                    video.addEventListener("loadeddata", renderLoop);
                }).catch(err => {
                    alert("Impossible d'accéder à la webcam.");
                    webcamRunning = false;
                });
            }
        }

        function renderLoop() {
            if (!webcamRunning) return;

            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                
                // SÉCURITÉ : Utilisation de l'horloge stricte de la vidéo au lieu de performance.now()
                let nowInMs = Math.round(video.currentTime * 1000);

                // --- MEDIAPIPE ---
                if (window.activeTab === 'mediapipe' && gestureRecognizer) {
                    const results = gestureRecognizer.recognizeForVideo(video, nowInMs);
                    
                    mpCtx.clearRect(0, 0, mpCanvas.width, mpCanvas.height);
                    const drawingUtils = new DrawingUtils(mpCtx);

                    if (results.landmarks) {
                        for (const landmarks of results.landmarks) {
                            drawingUtils.drawConnectors(landmarks, GestureRecognizer.HAND_CONNECTIONS, { color: "#00FF00", lineWidth: 3 });
                            drawingUtils.drawLandmarks(landmarks, { color: "#FF0000", lineWidth: 1 });
                        }
                    }

                    if (results.gestures.length > 0) {
                        gestureOutput.style.display = "block";
                        const name = results.gestures[0][0].categoryName;
                        const score = (results.gestures[0][0].score * 100).toFixed(1);
                        gestureOutput.innerText = `Geste détecté : ${name} (Confiance : ${score}%)`;
                    } else {
                        gestureOutput.innerText = "Geste : Aucun";
                    }
                }

                // --- OPENCV ---
                if (window.activeTab === 'opencv' && window.cvReady && video.videoWidth > 0) {
                    initOpenCVStructures();
                    
                    cap.read(srcFrame);
                    cv.GaussianBlur(srcFrame, blurredFrame, new cv.Size(5, 5), 0, 0, cv.BORDER_DEFAULT);
                    cv.cvtColor(blurredFrame, ycrcbFrame, cv.COLOR_BGR2YCrCb);

                    for (let color in colors_YCrCb) {
                        let cfg = colors_YCrCb[color];
                        let lower = new cv.Mat(ycrcbFrame.rows, ycrcbFrame.cols, ycrcbFrame.type(), cfg.lower);
                        let upper = new cv.Mat(ycrcbFrame.rows, ycrcbFrame.cols, ycrcbFrame.type(), cfg.upper);

                        cv.inRange(ycrcbFrame, lower, upper, mask);
                        cv.morphologyEx(mask, mask, cv.MORPH_OPEN, kernel);
                        cv.morphologyEx(mask, mask, cv.MORPH_CLOSE, kernel);

                        let contours = new cv.MatVector();
                        let hierarchy = new cv.Mat();
                        cv.findContours(mask, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

                        let clr = new cv.Scalar(cfg.bgr[0], cfg.bgr[1], cfg.bgr[2], cfg.bgr[3]);

                        // SÉCURITÉ ANTI-FREEZE : Le Disjoncteur
                        // S'il y a plus de 40 contours, c'est du bruit. On coupe pour ne pas faire exploser le CPU.
                        if (contours.size() > 40) {
                            lower.delete(); upper.delete();
                            contours.delete(); hierarchy.delete();
                            continue; // On passe à la couleur suivante
                        }

                        for (let i = 0; i < contours.size(); ++i) {
                            let c = contours.get(i);
                            if (cv.contourArea(c) > 500) {
                                let approx = new cv.Mat();
                                cv.approxPolyDP(c, approx, 0.02 * cv.arcLength(c, true), true);
                                let vec = new cv.MatVector();
                                vec.push_back(approx);
                                cv.drawContours(srcFrame, vec, -1, clr, 3);
                                approx.delete(); vec.delete();
                            }
                            c.delete();
                        }
                        lower.delete(); upper.delete();
                        contours.delete(); hierarchy.delete();
                    }
                    cv.imshow("cv_canvas", srcFrame);
                }
            }
            requestAnimationFrame(renderLoop);
        }
    </script>
</body>
</html>
